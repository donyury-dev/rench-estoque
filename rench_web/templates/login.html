<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - RENCH Equipamentos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
  :root{--primary:#850001;--primary-dark:#650001;}
  body{background:linear-gradient(135deg, #fff 0%, #f8f0f0 100%);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-card{width:100%;max-width:400px;border:none;border-radius:20px;box-shadow:0 10px 40px rgba(133,0,1,0.12);background:#fff;padding:40px 35px;}
  .login-logo{max-width:160px;display:block;margin:0 auto 25px;}
  .form-label{font-weight:600;color:#444;}
  .btn-login{width:100%;background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700;padding:12px;border-radius:10px;}
  .btn-login:hover{background:var(--primary-dark);}
  .login-title{text-align:center;color:var(--primary);font-weight:700;margin-bottom:5px;}
  .login-sub{text-align:center;color:#888;font-size:14px;margin-bottom:25px;}
  .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(133,0,1,0.15);}
  .input-icon{padding-left:40px;}
  .icon-left{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:16px;z-index:2;}
  .input-wrap{position:relative;}
</style>
</head>
<body>

<div class="login-card">
  <img src="{{url_for('static', filename='logo_rench.png')}}" alt="Rench" class="login-logo">
  <h3 class="login-title">Controle de Equipamentos</h3>
  <p class="login-sub">Acesse com suas credenciais</p>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{cat}} alert-dismissible fade show" role="alert">
          {{msg}}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="{{url_for('login')}}">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <div class="input-wrap">
        <i class="bi bi-person icon-left"></i>
        <input type="text" name="usuario" class="form-control input-icon" placeholder="admin" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Senha</label>
      <div class="input-wrap">
        <i class="bi bi-lock icon-left"></i>
        <input type="password" name="senha" class="form-control input-icon" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn btn-login">Entrar</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
